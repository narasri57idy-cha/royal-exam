<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบ – ราชการและทหาร</title>
<style>
  :root {
    --navy: #1a2e4a;
    --navy-light: #243d5e;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --bg: #f4f2ee;
    --white: #ffffff;
    --text: #1a1a1a;
    --text-muted: #5a6070;
    --green: #2d7a4f;
    --green-bg: #e8f5ee;
    --red: #b83232;
    --red-bg: #fdeaea;
    --blue-bg: #e8f0fa;
    --blue: #1a5fa8;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* COVER */
  #cover { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }
  .emblem { width: 80px; height: 80px; background: var(--navy); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(26,46,74,0.3); }
  .emblem svg { width: 44px; height: 44px; fill: var(--gold); }
  .cover-title { font-size: 26px; font-weight: 700; color: var(--navy); letter-spacing: 0.5px; margin-bottom: 0.25rem; text-align: center; }
  .cover-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; text-align: center; }
  .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; width: 100%; max-width: 700px; margin-bottom: 2rem; }
  .subj-card { background: var(--white); border-radius: var(--radius); padding: 14px 16px; border-left: 4px solid var(--gold); box-shadow: var(--shadow); }
  .subj-num { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .subj-name { font-size: 13px; font-weight: 600; color: var(--navy); margin: 4px 0 2px; line-height: 1.4; }
  .subj-count { font-size: 12px; color: var(--gold); font-weight: 600; }
  .loading-box { background: var(--white); border-radius: var(--radius); padding: 20px 28px; margin-bottom: 1.5rem; text-align: center; box-shadow: var(--shadow); display: none; width: 100%; max-width: 400px; }
  .loading-text { font-size: 14px; color: var(--text-muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid #e0ddd6; border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: var(--red-bg); border: 1px solid #f5c0c0; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 1.5rem; font-size: 14px; color: var(--red); display: none; max-width: 500px; width: 100%; }
  .start-btn { background: var(--navy); color: var(--white); border: none; border-radius: var(--radius); padding: 15px 48px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; box-shadow: 0 4px 16px rgba(26,46,74,0.25); letter-spacing: 0.5px; }
  .start-btn:hover { background: var(--navy-light); transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* EXAM */
  #exam { display: none; max-width: 780px; margin: 0 auto; padding: 1rem; }
  .exam-topbar { background: var(--navy); color: var(--white); border-radius: var(--radius); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; position: sticky; top: 8px; z-index: 10; box-shadow: 0 4px 16px rgba(26,46,74,0.3); }
  .topbar-left { display: flex; flex-direction: column; gap: 2px; }
  .q-counter { font-size: 13px; opacity: 0.8; }
  .q-progress-text { font-size: 15px; font-weight: 600; }
  .subj-pill { background: rgba(201,168,76,0.25); color: var(--gold-light); font-size: 12px; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.4); }
  .timer { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .timer.warn { color: #ff8080; }
  .timer-icon { width: 18px; height: 18px; opacity: 0.8; }
  .progress-bar { height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; margin-top: 10px; width: 100%; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; }

  .q-card { background: var(--white); border-radius: var(--radius); padding: 24px 28px; margin-bottom: 1rem; box-shadow: var(--shadow); }
  .q-label { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
  .q-text { font-size: 17px; line-height: 1.8; color: var(--text); font-weight: 500; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .opt-btn { display: flex; align-items: flex-start; gap: 14px; background: var(--white); border: 1.5px solid #e0dcd5; border-radius: var(--radius); padding: 14px 18px; cursor: pointer; text-align: left; font-size: 15px; color: var(--text); transition: all 0.12s; width: 100%; line-height: 1.6; }
  .opt-btn:hover:not(:disabled) { border-color: var(--navy); background: var(--blue-bg); }
  .opt-btn.selected { border-color: var(--blue); background: var(--blue-bg); color: var(--blue); }
  .opt-btn.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .opt-btn.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
  .opt-btn:disabled { cursor: default; }
  .opt-label { font-weight: 700; min-width: 24px; font-size: 15px; }

  .explain-card { background: #fffbf0; border-left: 4px solid var(--gold); border-radius: 0 var(--radius) var(--radius) 0; padding: 14px 18px; font-size: 14px; color: #5a4a20; line-height: 1.7; display: none; margin-bottom: 1rem; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .nav-btn { background: var(--white); border: 1.5px solid #d0ccc5; border-radius: var(--radius); padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.12s; display: flex; align-items: center; gap: 6px; }
  .nav-btn:hover { border-color: var(--navy); color: var(--navy); }
  .nav-btn.primary { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .nav-btn.primary:hover { background: var(--navy-light); }
  .answered-info { font-size: 13px; color: var(--text-muted); }
  .reveal-btn { background: none; border: none; font-size: 13px; color: var(--blue); cursor: pointer; text-decoration: underline; padding: 4px 0; display: none; }

  /* RESULT */
  #result { display: none; max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }
  .result-header { text-align: center; margin-bottom: 2rem; }
  .score-ring { width: 140px; height: 140px; margin: 0 auto 1.5rem; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .score-big { font-size: 28px; font-weight: 700; color: var(--navy); display: block; }
  .score-denom { font-size: 13px; color: var(--text-muted); }
  .result-msg { font-size: 18px; font-weight: 600; margin-bottom: 0.25rem; }
  .result-pct { font-size: 14px; color: var(--text-muted); }
  .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 1.5rem 0 2rem; }
  .rc { background: var(--white); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); border-top: 3px solid var(--gold); }
  .rc-name { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; line-height: 1.4; }
  .rc-score { font-size: 20px; font-weight: 700; color: var(--navy); }
  .rc-pct { font-size: 12px; color: var(--text-muted); }
  .retry-btn { background: var(--navy); color: var(--white); border: none; border-radius: var(--radius); padding: 14px 44px; font-size: 15px; font-weight: 600; cursor: pointer; display: block; margin: 0 auto; transition: background 0.15s; }
  .retry-btn:hover { background: var(--navy-light); }

  @media (max-width: 500px) {
    .exam-topbar { position: static; }
    .q-card { padding: 18px; }
    .cover-title { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <div class="emblem">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2zm-1 13l-3-3 1.41-1.41L11 12.17l4.59-4.58L17 9l-6 6z"/>
    </svg>
  </div>
  <div class="cover-title">แบบทดสอบ</div>
  <div class="cover-sub">ราชการและทหาร &nbsp;|&nbsp; 120 ข้อ &nbsp;|&nbsp; 2 ชั่วโมง 30 นาที</div>

  <div class="subject-grid" id="subj-grid"></div>

  <div class="loading-box" id="loading-box">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">กำลังโหลดคลังข้อสอบ...</div>
  </div>
  <div class="error-box" id="error-box"></div>

  <button class="start-btn" id="start-btn" onclick="startExam()">เริ่มทำข้อสอบ</button>
</div>

<!-- EXAM -->
<div id="exam">
  <div class="exam-topbar">
    <div class="topbar-left">
      <div class="q-counter" id="q-counter">ข้อ 1 / 120</div>
      <div class="q-progress-text" id="q-progress">ตอบแล้ว 0 ข้อ</div>
    </div>
    <div class="subj-pill" id="subj-pill"></div>
    <div class="timer" id="timer">
      <svg class="timer-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
      <span id="timer-text">2:30:00</span>
    </div>
    <div class="progress-bar" style="width:100%"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="q-card">
    <div class="q-label" id="q-label">คำถาม</div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="options" id="options"></div>
  <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">▶ ดูเฉลยและคำอธิบาย</button>
  <div class="explain-card" id="explain-card"></div>

  <div class="nav-row">
    <button class="nav-btn" onclick="navigate(-1)">← ก่อนหน้า</button>
    <span class="answered-info" id="answered-info"></span>
    <button class="nav-btn primary" id="next-btn" onclick="navigate(1)">ถัดไป →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-header">
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#e8e5e0" stroke-width="12"/>
        <circle cx="70" cy="70" r="58" fill="none" id="score-arc" stroke="#1a2e4a" stroke-width="12" stroke-linecap="round" stroke-dasharray="364.4" stroke-dashoffset="364.4"/>
      </svg>
      <div class="score-ring-text">
        <span class="score-big" id="score-big">0/120</span>
        <span class="score-denom" id="score-denom">คะแนน</span>
      </div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-pct" id="result-pct"></div>
  </div>
  <div class="result-grid" id="result-grid"></div>
  <button class="retry-btn" onclick="resetExam()">ทำข้อสอบใหม่</button>
</div>

<script>
const SHEET_BASE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQDOb5-mZNVgmA_452x_XkAY4jmwae8sz95CNTt7r8vM5ks-6ZQEBV8xDGwv3XnlpIVmmIeoMl_h__T/pub?output=csv";

const SUBJECTS = [
  { name: "ด้านการคำนวณ",                    gid: "1115793668", color: "#1a5fa8" },
  { name: "ด้านเหตุผล (การเชื่อมโยง)",       gid: "1762333009", color: "#2d7a4f" },
  { name: "ภาษาไทย",                          gid: "1104956609", color: "#7b3fa0" },
  { name: "ภาษาอังกฤษ",                       gid: "1687082512",  color: "#b05a10" },
  { name: "ความรู้การเป็นข้าราชการที่ดี",    gid: "889135714", color: "#2d6a4f" },
  { name: "ความรู้ทางทหาร",                  gid: "1033819834", color: "#8b5a00" },
];
const PICK = 20;
const TOTAL_SEC = 2.5 * 3600;

let allQuestions = [];
let examQuestions = [];
let answers = [];
let current = 0;
let timerSec = TOTAL_SEC;
let timerInterval = null;
let dataLoaded = false;

// Build subject cards
const grid = document.getElementById('subj-grid');
SUBJECTS.forEach((s, i) => {
  grid.innerHTML += `<div class="subj-card">
    <div class="subj-num">วิชาที่ ${i+1}</div>
    <div class="subj-name">${s.name}</div>
    <div class="subj-count">คลัง 60 ข้อ → ออกสอบ 20 ข้อ</div>
  </div>`;
});

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    const cols = [];
    let cur = '', inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    if (cols.length >= 7 && cols[1]) {
      rows.push({ q: cols[1], a: cols[2], b: cols[3], c: cols[4], d: cols[5], ans: cols[6].trim(), exp: cols[7] || '' });
    }
  }
  return rows;
}

async function fetchSheet(gid) {
  const url = `${SHEET_BASE}&gid=${gid}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return parseCSV(await resp.text());
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function loadData() {
  document.getElementById('loading-box').style.display = 'block';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('error-box').style.display = 'none';
  allQuestions = [];

  try {
    for (let i = 0; i < SUBJECTS.length; i++) {
      document.getElementById('loading-text').textContent = `กำลังโหลด: ${SUBJECTS[i].name}...`;
      const rows = await fetchSheet(SUBJECTS[i].gid);
      rows.forEach(r => { r.subjIdx = i; });
      allQuestions.push(rows);
    }
    dataLoaded = true;
    document.getElementById('loading-text').textContent = `โหลดสำเร็จ! รวม ${allQuestions.reduce((s,a)=>s+a.length,0)} ข้อ`;
    setTimeout(() => { document.getElementById('loading-box').style.display = 'none'; }, 800);
    document.getElementById('start-btn').disabled = false;
  } catch(e) {
    document.getElementById('loading-box').style.display = 'none';
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-box').innerHTML = `
      <strong>⚠ โหลดข้อมูลไม่สำเร็จ</strong><br>
      กรุณาตรวจสอบว่า Google Sheets ตั้งค่า "Publish to web" แล้ว<br>
      <small style="opacity:0.7">${e.message}</small>`;
    document.getElementById('start-btn').disabled = false;
  }
}

function startExam() {
  if (!dataLoaded) { alert('กรุณารอโหลดข้อมูลให้เสร็จก่อน'); return; }

  examQuestions = [];
  SUBJECTS.forEach((_, i) => {
    const pool = allQuestions[i] || [];
    const picked = shuffle(pool).slice(0, PICK);
    picked.forEach(q => examQuestions.push({ ...q, subjIdx: i }));
  });
  examQuestions = shuffle(examQuestions);
  answers = new Array(examQuestions.length).fill(-1);
  current = 0;
  timerSec = TOTAL_SEC;

  document.getElementById('cover').style.display = 'none';
  document.getElementById('exam').style.display = 'block';
  renderQuestion();
  startTimer();
}

function renderQuestion() {
  const q = examQuestions[current];
  const s = SUBJECTS[q.subjIdx];
  const labels = ['ก','ข','ค','ง'];
  const opts = [q.a, q.b, q.c, q.d];

  document.getElementById('q-counter').textContent = `ข้อ ${current+1} / ${examQuestions.length}`;
  const answered = answers.filter(a => a !== -1).length;
  document.getElementById('q-progress').textContent = `ตอบแล้ว ${answered} ข้อ`;
  document.getElementById('subj-pill').textContent = s.name;
  document.getElementById('progress-fill').style.width = `${((current+1)/examQuestions.length)*100}%`;
  document.getElementById('q-label').textContent = `วิชา: ${s.name}`;
  document.getElementById('q-text').textContent = `${current+1}. ${q.q}`;

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (answers[current] === i) btn.classList.add('selected');
    btn.innerHTML = `<span class="opt-label">${labels[i]}.</span><span>${o}</span>`;
    btn.onclick = () => selectOpt(i);
    optEl.appendChild(btn);
  });

  const revealBtn = document.getElementById('reveal-btn');
  const explainCard = document.getElementById('explain-card');
  revealBtn.style.display = answers[current] !== -1 ? 'inline' : 'none';
  explainCard.style.display = 'none';

  const nextBtn = document.getElementById('next-btn');
  if (current === examQuestions.length - 1) {
    nextBtn.textContent = 'ส่งข้อสอบ ✓';
  } else {
    nextBtn.textContent = 'ถัดไป →';
  }
  document.getElementById('answered-info').textContent = `ตอบแล้ว ${answered} / ${examQuestions.length}`;
}

function selectOpt(idx) {
  answers[current] = idx;
  renderQuestion();
}

function revealAnswer() {
  const q = examQuestions[current];
  const labels = ['ก','ข','ค','ง'];
  const ansMap = { 'ก':0,'ข':1,'ค':2,'ง':3,'a':0,'b':1,'c':2,'d':3 };
  const correctIdx = ansMap[q.ans.toLowerCase()] ?? 0;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.classList.remove('selected','correct','wrong');
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === answers[current] && answers[current] !== correctIdx) btn.classList.add('wrong');
  });

  const exp = document.getElementById('explain-card');
  exp.style.display = 'block';
  exp.innerHTML = `<strong>เฉลย: ${labels[correctIdx]}</strong>${q.exp ? ` — ${q.exp}` : ''}`;
  document.getElementById('reveal-btn').style.display = 'none';
}

function navigate(dir) {
  if (dir === 1 && current === examQuestions.length - 1) {
    if (!confirm('ต้องการส่งข้อสอบและดูผลคะแนน?')) return;
    submitExam(); return;
  }
  current = Math.max(0, Math.min(examQuestions.length - 1, current + dir));
  renderQuestion();
  document.getElementById('explain-card').style.display = 'none';
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSec--;
    if (timerSec <= 0) { clearInterval(timerInterval); submitExam(); return; }
    const h = Math.floor(timerSec / 3600);
    const m = Math.floor((timerSec % 3600) / 60);
    const s = timerSec % 60;
    document.getElementById('timer-text').textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const timerEl = document.getElementById('timer');
    if (timerSec < 600) timerEl.classList.add('warn');
  }, 1000);
}

function submitExam() {
  clearInterval(timerInterval);
  const ansMap = { 'ก':0,'ข':1,'ค':2,'ง':3,'a':0,'b':1,'c':2,'d':3 };
  let total = 0;
  const bySubj = SUBJECTS.map(() => ({correct:0, total:0}));

  examQuestions.forEach((q, i) => {
    const correctIdx = ansMap[q.ans.toLowerCase()] ?? 0;
    bySubj[q.subjIdx].total++;
    if (answers[i] === correctIdx) { total++; bySubj[q.subjIdx].correct++; }
  });

  document.getElementById('exam').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const pct = Math.round((total / examQuestions.length) * 100);
  const circumference = 2 * Math.PI * 58;
  const offset = circumference * (1 - pct / 100);
  document.getElementById('score-arc').style.strokeDashoffset = offset;
  document.getElementById('score-arc').style.stroke = pct >= 60 ? '#2d7a4f' : '#b83232';
  document.getElementById('score-big').textContent = `${total}/${examQuestions.length}`;
  document.getElementById('result-msg').textContent = pct >= 60 ? '🎖 ผ่านเกณฑ์' : '📝 ไม่ผ่านเกณฑ์';
  document.getElementById('result-msg').style.color = pct >= 60 ? '#2d7a4f' : '#b83232';
  document.getElementById('result-pct').textContent = `ได้ ${pct}% (เกณฑ์ผ่าน 60%)`;

  const rg = document.getElementById('result-grid');
  rg.innerHTML = '';
  SUBJECTS.forEach((s, i) => {
    const bs = bySubj[i];
    const p = bs.total ? Math.round(bs.correct / bs.total * 100) : 0;
    rg.innerHTML += `<div class="rc">
      <div class="rc-name">${s.name}</div>
      <div class="rc-score" style="color:${p>=60?'#2d7a4f':'#b83232'}">${bs.correct}/${bs.total}</div>
      <div class="rc-pct">${p}%</div>
    </div>`;
  });
}

function resetExam() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('cover').style.display = 'flex';
}

// Auto-load on start
loadData();
</script>
</body>
